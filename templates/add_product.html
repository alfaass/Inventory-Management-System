<!DOCTYPE html>
<html>

<head>

<title>
Add Product
</title>

<link rel="stylesheet" href="/static/style.css">

</head>


<body>


<h1>
Add New Product
</h1>


<form method="POST">


<label>
Product Name
</label>
<br>

<input 
type="text"
name="name"
required>

<br><br>



<label>
Category
</label>
<br>

<input 
type="text"
name="category"
required>

<br><br>



<label>
Price
</label>
<br>

<input 
type="number"
name="price"
required>

<br><br>



<label>
Stock Quantity
</label>
<br>

<input 
type="number"
name="stock"
required>

<br><br>



<label>
Reorder Level
</label>
<br>

<input 
type="number"
name="reorder"
required>

<br><br>



<label>
Supplier Name
</label>
<br>

<input 
type="text"
name="supplier"
required>

<br><br>



<label>
Supplier Phone
</label>
<br>

<input 
type="text"
name="phone"
required>

<br><br>



<label>
Supplier Email
</label>
<br>

<input 
type="email"
name="email"
required>

<br><br>



<button type="submit">

Add Product

</button>


</form>


<br>


<a href="/">
<button>
Back Home
</button>
</a>


</body>

</html>
